services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: shopsphere_backend

    ports:
      - "5000:5000"

    env_file:
      - .env

    depends_on:
      - redis

    restart: unless-stopped

  redis:
    image: redis:7-alpine

    container_name: shopsphere-redis

    restart: unless-stopped

    ports:
      - "6379:6379"